name: CI for Recipe Manager

# Controls when the workflow will run
on:
  push:
    branches: [ "master" ]  # Adjust to the correct branch (e.g., main)
  pull_request:
    branches: [ "master" ]  # Adjust to the correct branch (e.g., main)

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # 1. Checkout the repository code
      - uses: actions/checkout@v4

      # 2. Set up Node.js (or adjust this step based on your technology stack)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'  # Adjust to the version you're using

      # 3. Install dependencies (adjust this to match your package manager)
      - name: Install dependencies
        run: |
          npm install  # Or `yarn install` if you're using Yarn

      # 4. Run your tests (adjust the command if you're using a different test suite)
      - name: Run tests
        run: |
          npm test  # Or `yarn test` if you're using Yarn

      # 5. Build your app (if necessary)
      - name: Build the app
        run: |
          npm run build  # Or any other build command you use

      # 6. Deploy (optional, if you have deployment steps)
      # - name: Deploy to Production
      #   run: |
      #     # Deploy your app here (e.g., push to a server, cloud service, etc.)

      # 7. Example to notify upon success/failure (optional)
      - name: Notify success
        if: success()
        run: echo "Recipe Manager app CI job succeeded!"

      - name: Notify failure
        if: failure()
        run: echo "Recipe Manager app CI job failed!"
